const { useState, useEffect } = React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const GYM_SESSIONS = {

    { id:"pushdown_r",  name:"Tricep Pushdown (rope)",        sets:3, reps:"15",    weight:25,  unit:"kg",      max:55  },

    { id:"incline_dbc", name:"Incline DB Curl",               sets:3, reps:"10",    weight:10,  unit:"kg each", max:20  },

    { id:"sohp",        name:"Seated DB Overhead Press",      sets:4, reps:"8",     weight:10,  unit:"kg each", max:20  },
    { id:"latraise",    name:"Lateral Raise (DB)",            sets:4, reps:"15",    weight:7.5, unit:"kg each", max:18  },

    { id:"upright",     name:"Upright Row (cable)",           sets:3, reps:"12",    weight:30,  unit:"kg",      max:50  },
    { id:"shrugs_db",   name:"DB Shrugs",                     sets:3, reps:"15",    weight:20,  unit:"kg each", max:40  },
    { id:"shrugs_w",    name:"Weighted Shrugs (extra hold)",  sets:2, reps:"20",    weight:10,  unit:"kg each", max:30  },
  ],
  "Push B": [
    { id:"incline_db_b",name:"Incline DB Press",              sets:3, reps:"8-10",  weight:20,  unit:"kg each", max:35  },
    { id:"flat_db",     name:"Flat DB Press",                 sets:3, reps:"10-12", weight:20,  unit:"kg each", max:35  },
    { id:"chest_m_b",   name:"Chest Press Machine",           sets:3, reps:"12",    weight:40,  unit:"kg",      max:80  },
    { id:"crossover",   name:"Cable Crossover / Pec Deck",    sets:3, reps:"15",    weight:40,  unit:"kg",      max:65  },
    { id:"dips",        name:"Weighted Dips",                 sets:3, reps:"10",    weight:0,   unit:"BW+kg",   max:30, bw:true },
    { id:"ohe_b",       name:"Overhead Tricep Ext.",          sets:3, reps:"12",    weight:15,  unit:"kg",      max:35  },
    { id:"pushdown_b",  name:"Tricep Pushdown (straight bar)",sets:3, reps:"12",    weight:45,  unit:"kg",      max:70  },
  ],
};

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MACROS = { kcal:3200, protein:145, carbs:380, fat:75 };
const BODY_START = 72.4;
const TARGET_LOW = 75;
const TARGET_HIGH = 78;
const SESSION_ORDER = ["Push A","Pull","Legs","Arms","Shoulders","Push B"];
const SUPPS = [
  { id:"vitd",  label:"Vit D + Zinc + Electrolytes", time:"Breakfast" },
  { id:"whey",  label:"Whey 40-50g",                 time:"Post-workout" },
  { id:"mag",   label:"Magnesium glycinate",          time:"21:00" },
];
const STORAGE_KEY = "hkns_v5";

// ── STORAGE ───────────────────────────────────────────────────────────────────
function loadData() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    return r ? JSON.parse(r) : { sessions:{}, foodLogs:{}, bodyLogs:[], suppLogs:{} };
  } catch(e) { return { sessions:{}, foodLogs:{}, bodyLogs:[], suppLogs:{} }; }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }

// ── UTILS ─────────────────────────────────────────────────────────────────────
function getTodayKey() { return new Date().toISOString().split("T")[0]; }
function todayDay() {
  const d = new Date().toLocaleDateString("en-US",{weekday:"short"}).slice(0,3);
  return DAYS.includes(d) ? d : DAYS[0];
}
function getBestWeight(setMap) {
  if (!setMap) return null;
  const ws = Object.values(setMap).map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
  return ws.length ? Math.max.apply(null, ws) : null;
}
function getLastSessionData(data, sessionName, exId) {
  const today = getTodayKey();
  const dates = Object.keys(data.sessions||{}).filter(d => d < today).sort().reverse();
  for (var i=0; i<dates.length; i++) {
    var sess = data.sessions[dates[i]];
    if (sess && sess.gym && sess.gym.name === sessionName) {
      var w = getBestWeight(sess.gym.sets && sess.gym.sets[exId]);
      if (w !== null) return { date: dates[i], weight: w };
    }
  }
  return null;
}
function getStreak(data) {
  var streak = 0;
  var d = new Date();
  var today = getTodayKey();
  for (var i=0; i<365; i++) {
    var key = d.toISOString().split("T")[0];
    var sess = data.sessions && data.sessions[key];
    var logged = false;
    if (sess) {
      if (sess.gym && sess.gym.name) logged = true;
      else if (sess.swim && sess.swim.saved) logged = true;
      else {
        var vals = Object.values(sess);
        for (var j=0; j<vals.length; j++) {
          if (vals[j] && (vals[j].activity === "gym" || vals[j].activity === "swim" || vals[j].activity === "rest")) {
            logged = true; break;
          }
        }
      }
    }
    if (!logged && key !== today) break;
    if (logged) streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function getNextSession(data) {
  var dates = Object.keys(data.sessions||{}).sort().reverse();
  for (var i=0; i<dates.length; i++) {
    var sess = data.sessions[dates[i]];
    if (sess && sess.gym && sess.gym.name) {
      var idx = SESSION_ORDER.indexOf(sess.gym.name);
      if (idx !== -1) return SESSION_ORDER[(idx+1) % SESSION_ORDER.length];
    }
  }
  return "Push A";
}
function getSessionInfo(data, date) {
  var sess = data.sessions && data.sessions[date];
  if (!sess) return null;
  if (sess.gym && sess.gym.name) return { label:"Gym — "+sess.gym.name, color:"#8b1a2e" };
  if (sess.swim && sess.swim.saved) {
    var lbl = "Swim" + (sess.swim.mins ? " "+sess.swim.mins+"min" : "") + (sess.swim.sauna ? " + Sauna" : "");
    return { label:lbl, color:"#4a7a8a" };
  }
  var vals = Object.values(sess);
  for (var i=0; i<vals.length; i++) {
    if (vals[i] && vals[i].activity === "gym") return { label:"Gym", color:"#8b1a2e" };
    if (vals[i] && vals[i].activity === "swim") return { label:"Swimming", color:"#4a7a8a" };
    if (vals[i] && vals[i].activity === "rest") return { label:"Rest Day", color:"#b0a898" };
  }
  return null;
}
function exportCSV(data) {

  // Helper: escape cell for CSV (wrap in quotes if contains comma/newline)
  function cell(v) {
    var s = v === null || v === undefined ? "" : String(v);
    if (s.indexOf(",") > -1 || s.indexOf("\n") > -1 || s.indexOf('"') > -1) {
      s = '"' + s.replace(/"/g,'""') + '"';
    }
    return s;
  }
  function row(arr) { return arr.map(cell).join(","); }

  // Exercise ID → readable name lookup
  var exNames = {};
  Object.keys(GYM_SESSIONS).forEach(function(sName) {
    GYM_SESSIONS[sName].forEach(function(ex) { exNames[ex.id] = ex.name; });
  });

  var sections = [];

  // ── SECTION 1: GYM SESSIONS ──────────────────────────────────────────────
  sections.push("TRAINING LOG — GYM SESSIONS");
  sections.push(row(["Date","Session","Exercise","Set 1 (kg)","Set 2 (kg)","Set 3 (kg)","Set 4 (kg)","Best Weight (kg)","All Sets Done","Note"]));

  var gymDates = Object.keys(data.sessions||{}).sort();
  for (var i=0; i<gymDates.length; i++) {
    var date = gymDates[i];
    var sess = data.sessions[date];
    if (!sess || !sess.gym || !sess.gym.name) continue;
    var sessionName = sess.gym.name;
    var note = sess.gym.note || "";
    var exIds = Object.keys(GYM_SESSIONS[sessionName] ? GYM_SESSIONS[sessionName].reduce(function(acc,ex){acc[ex.id]=true;return acc;},{}) : {});
    // Use the ordered exercise list for this session
    var exList = GYM_SESSIONS[sessionName] || [];
    for (var j=0; j<exList.length; j++) {
      var ex = exList[j];
      var exLog = (sess.gym.sets && sess.gym.sets[ex.id]) || {};
      var setWeights = [];
      var allDone = true;
      for (var k=0; k<ex.sets; k++) {
        var s = exLog[k];
        if (s && s.weight) { setWeights.push(s.weight); if (!s.done) allDone = false; }
        else { setWeights.push(""); allDone = false; }
      }
      // pad to 4 sets
      while (setWeights.length < 4) setWeights.push("");
      var best = getBestWeight(exLog);
      var hasAnyData = setWeights.some(function(w){return w !== "";});
      if (!hasAnyData) continue; // skip exercises not touched
      sections.push(row([
        date, sessionName, exNames[ex.id]||ex.id,
        setWeights[0], setWeights[1], setWeights[2], setWeights[3],
        best !== null ? best : "",
        allDone ? "Yes" : "Partial",
        j === 0 ? note : "" // only show note on first exercise row
      ]));
    }
  }

  sections.push(""); // blank line between sections

  // ── SECTION 2: SWIM SESSIONS ─────────────────────────────────────────────
  sections.push("TRAINING LOG — SWIM SESSIONS");
  sections.push(row(["Date","Duration (min)","Laps","Sauna","Sauna Duration (min)"]));
  var swimDates = Object.keys(data.sessions||{}).sort();
  var hasSwim = false;
  for (var i=0; i<swimDates.length; i++) {
    var date = swimDates[i];
    var sess = data.sessions[date];
    if (sess && sess.swim && sess.swim.saved) {
      hasSwim = true;
      sections.push(row([
        date,
        sess.swim.mins || "",
        sess.swim.laps || "",
        sess.swim.sauna ? "Yes" : "No",
        sess.swim.sauna ? (sess.swim.saunaTime || "") : ""
      ]));
    }
  }
  if (!hasSwim) sections.push(row(["No swim sessions logged yet","","","",""]));

  sections.push("");

  // ── SECTION 3: BODY WEIGHT ───────────────────────────────────────────────
  sections.push("BODY WEIGHT LOG");
  sections.push(row(["Date","Weight (kg)","Change from Previous (kg)","Notes"]));
  var bodyLogs = data.bodyLogs || [];
  for (var i=0; i<bodyLogs.length; i++) {
    var prev = i > 0 ? bodyLogs[i-1].weight : null;
    var change = prev !== null ? (Math.round((bodyLogs[i].weight - prev)*10)/10) : "";
    var changeStr = change !== "" ? (change > 0 ? "+"+change : String(change)) : "—";
    sections.push(row([bodyLogs[i].date, bodyLogs[i].weight, changeStr, ""]));
  }
  if (!bodyLogs.length) sections.push(row(["No weight logs yet","","",""]));

  sections.push("");

  // ── SECTION 4: NUTRITION / FOOD LOG ─────────────────────────────────────
  sections.push("NUTRITION LOG");
  sections.push(row(["Date","Food Item","Quantity","Unit","Calories (kcal)","Protein (g)","Carbs (g)","Fat (g)"]));
  var foodDates = Object.keys(data.foodLogs||{}).sort();
  var hasFood = false;
  for (var i=0; i<foodDates.length; i++) {
    var date = foodDates[i];
    var foods = data.foodLogs[date] || [];
    for (var j=0; j<foods.length; j++) {
      hasFood = true;
      var f = foods[j];
      sections.push(row([date, f.name||"", f.qty||"", f.unit||"", f.kcal||0, f.protein||0, f.carbs||0, f.fat||0]));
    }
    // Daily totals row
    if (foods.length > 1) {
      var tot = foods.reduce(function(acc,f){return{kcal:acc.kcal+(f.kcal||0),protein:acc.protein+(f.protein||0),carbs:acc.carbs+(f.carbs||0),fat:acc.fat+(f.fat||0)};},{kcal:0,protein:0,carbs:0,fat:0});
      sections.push(row([date+" TOTAL","","","",Math.round(tot.kcal),Math.round(tot.protein*10)/10,Math.round(tot.carbs*10)/10,Math.round(tot.fat*10)/10]));
      sections.push(""); // space between days
    }
  }
  if (!hasFood) sections.push(row(["No nutrition logs yet","","","","","","",""]));

  sections.push("");

  // ── SECTION 5: SUPPLEMENTS ───────────────────────────────────────────────
  sections.push("SUPPLEMENT LOG");
  sections.push(row(["Date","Vit D + Zinc + Electrolytes","Whey Post-Workout","Magnesium 21:00","Total Completed"]));
  var suppDates = Object.keys(data.suppLogs||{}).sort();
  var hasSupp = false;
  for (var i=0; i<suppDates.length; i++) {
    var date = suppDates[i];
    var sl = data.suppLogs[date] || {};
    var vitd = sl.vitd ? "✓" : "✗";
    var whey = sl.whey ? "✓" : "✗";
    var mag  = sl.mag  ? "✓" : "✗";
    var total = [sl.vitd,sl.whey,sl.mag].filter(Boolean).length + "/3";
    hasSupp = true;
    sections.push(row([date, vitd, whey, mag, total]));
  }
  if (!hasSupp) sections.push(row(["No supplement logs yet","","","",""]));

  sections.push("");

  // ── SECTION 6: STRENGTH PROGRESS SUMMARY ────────────────────────────────
  sections.push("STRENGTH PROGRESS SUMMARY");
  sections.push(row(["Exercise","Best Weight Ever (kg)","Target (kg)","Progress (%)"]));
  var strengthTargets = [
    {name:"Bench Press",  exIds:["bench","bench2"],     target:100},
    {name:"Pull-ups",     exIds:["pullups"],             target:20, note:"kg added"},
    {name:"Close-Grip BP",exIds:["cgbp"],               target:75},
    {name:"EZ Bar Curl",  exIds:["ez_arms","ez_curl"],  target:20, note:"per side"},
    {name:"OHP (DB)",     exIds:["ohp_db","sohp"],      target:32},
    {name:"Lat Pulldown", exIds:["latpull"],             target:85},
    {name:"Squat",        exIds:["squat"],               target:120},
    {name:"Leg Press",    exIds:["legpress"],            target:160},
    {name:"Romanian DL",  exIds:["rdl"],                 target:100},
  ];
  for (var i=0; i<strengthTargets.length; i++) {
    var t = strengthTargets[i];
    var best = 0;
    var allDates2 = Object.keys(data.sessions||{});
    for (var j=0; j<allDates2.length; j++) {
      var s2 = data.sessions[allDates2[j]];
      if (!s2||!s2.gym||!s2.gym.sets) continue;
      for (var k=0; k<t.exIds.length; k++) {
        var w = getBestWeight(s2.gym.sets[t.exIds[k]]);
        if (w!==null && w>best) best=w;
      }
    }
    var pct = best > 0 ? Math.round((best/t.target)*100)+"%" : "No data";
    sections.push(row([t.name+(t.note?" ("+t.note+")":""), best>0?best:"—", t.target+(t.note?" "+t.note:""), pct]));
  }

  // ── ASSEMBLE AND DOWNLOAD ─────────────────────────────────────────────────
  var csv = sections.join("\n");
  var BOM = "\uFEFF"; // UTF-8 BOM so Excel opens it correctly with special chars
  var blob = new Blob([BOM+csv], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "hakansons-training-"+getTodayKey()+".csv";
  a.click();
  URL.revokeObjectURL(url);
}

// ── SHARED COMPONENTS ─────────────────────────────────────────────────────────
function Btn(props) {
  var active=props.active, onClick=props.onClick, gold=props.gold, small=props.small, full=props.full;
  return (
    <button onClick={onClick} style={{
      padding: small?"7px 14px":"12px 18px",
      width: full?"100%":undefined,
      background: gold?"#8b1a2e": active?"#d8d2c6":"#ede8de",
      border:"1px solid",
      borderColor: gold?"#8b1a2e": active?"#8b1a2e":"#c8c2b4",
      color: gold?"#f5f0e8": active?"#8b1a2e":"#686658",
      cursor:"pointer", fontSize:small?10:11, letterSpacing:"0.18em",
      textTransform:"uppercase", fontFamily:"'Cormorant Garamond',serif",
      fontWeight: active||gold?700:400, transition:"all 0.15s",
    }}>{props.children}</button>
  );
}
function Label(props) {
  return <div style={{fontSize:10,letterSpacing:"0.28em",color:"#8b1a2e",textTransform:"uppercase",marginBottom:14}}>{props.children}</div>;
}
function Delta(props) {
  if (!props.prev || !props.current) return null;
  var diff = parseFloat(props.current) - parseFloat(props.prev);
  if (isNaN(diff) || diff === 0) return <span style={{fontSize:10,color:"#909080",marginLeft:6}}>—</span>;
  var up = diff > 0;
  return <span style={{fontSize:10,color:up?"#3a7a4a":"#8b1a2e",marginLeft:6,fontWeight:700}}>{up?"▲":"▼"} {Math.abs(diff)}kg</span>;
}

// ── GYM FLOW ──────────────────────────────────────────────────────────────────
function GymFlow(props) {
  var date=props.date, data=props.data, setData=props.setData, showFlash=props.showFlash;
  var sess = (data.sessions&&data.sessions[date]&&data.sessions[date].gym) || {};
  var chosen = sess.name || null;
  var exercises = chosen ? GYM_SESSIONS[chosen] : [];
  var sets = sess.sets || {};
  var [note,setNote] = useState(sess.note||"");

  function pickSession(name) {
    setData(function(prev) {
      var existing = (prev.sessions&&prev.sessions[date]&&prev.sessions[date].gym)||{};
      return Object.assign({},prev,{sessions:Object.assign({},prev.sessions,{[date]:Object.assign({},prev.sessions&&prev.sessions[date],{gym:Object.assign({},existing,{name:name})})})});
    });
  }
  function logSet(exId, idx, field, value) {
    setData(function(prev) {
      var gymData = JSON.parse(JSON.stringify((prev.sessions&&prev.sessions[date]&&prev.sessions[date].gym)||{}));
      if (!gymData.sets) gymData.sets = {};
      if (!gymData.sets[exId]) gymData.sets[exId] = {};
      if (!gymData.sets[exId][idx]) gymData.sets[exId][idx] = {};
      gymData.sets[exId][idx][field] = value;
      return Object.assign({},prev,{sessions:Object.assign({},prev.sessions,{[date]:Object.assign({},prev.sessions&&prev.sessions[date],{gym:gymData})})});
    });
  }
  function saveNote() {
    setData(function(prev) {
      var gymData = JSON.parse(JSON.stringify((prev.sessions&&prev.sessions[date]&&prev.sessions[date].gym)||{}));
      gymData.note = note;
      return Object.assign({},prev,{sessions:Object.assign({},prev.sessions,{[date]:Object.assign({},prev.sessions&&prev.sessions[date],{gym:gymData})})});
    });
    showFlash("Note saved");
  }

  return (
    <div>
      <Label>Choose session</Label>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:28}}>
        {Object.keys(GYM_SESSIONS).map(function(name) {
          return <Btn key={name} active={chosen===name} small onClick={function(){pickSession(name);}}>{name}</Btn>;
        })}
      </div>
      {chosen && (
        <div>
          <div style={{fontSize:14,letterSpacing:"0.06em",marginBottom:4,color:"#2a2420"}}>{chosen}</div>
          <div style={{fontSize:10,color:"#787868",letterSpacing:"0.14em",marginBottom:22,textTransform:"uppercase"}}>
            {chosen==="Push A"?"Chest · Shoulders · Triceps":chosen==="Push B"?"Chest · Tricep Volume":chosen==="Pull"?"Back · Biceps · Rear Delts":chosen==="Legs"?"Quads · Hamstrings · Calves":chosen==="Arms"?"Biceps · Triceps":"Full Delts · Traps"}
          </div>
          {exercises.map(function(ex) {
            var exLog = sets[ex.id]||{};
            var last = getLastSessionData(data, chosen, ex.id);
            var best = getBestWeight(exLog);
            return (
              <div key={ex.id} style={{marginBottom:16,background:"#ede8de",border:"1px solid #d0cabe",padding:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div style={{fontSize:13,letterSpacing:"0.04em",color:"#2a2420"}}>{ex.name}</div>
                  <div style={{fontSize:10,color:"#787868",textAlign:"right"}}>
                    {ex.sets}x{ex.reps}
                    {ex.max && <span style={{color:"#8b1a2e",marginLeft:5}}>{"→"}{ex.max}{ex.bw?"kg+":" "+ex.unit}</span>}
                  </div>
                </div>
                <div style={{fontSize:10,color:"#909080",marginBottom:10,display:"flex",alignItems:"center",gap:4}}>
                  {last ? (
                    <span>Last: <span style={{color:"#504e42"}}>{last.weight}kg</span> <span style={{color:"#b8b2a4"}}>{last.date}</span><Delta prev={last.weight} current={best}/></span>
                  ) : (
                    <span style={{color:"#c8c2b4",fontStyle:"italic"}}>No previous data</span>
                  )}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat("+ex.sets+",1fr)",gap:6}}>
                  {Array.from({length:ex.sets},function(_,i) {
                    var s = exLog[i]||{};
                    return (
                      <div key={i} style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:"#909080",marginBottom:3}}>SET {i+1}</div>
                        <input
                          placeholder={last?String(last.weight):String(ex.weight)}
                          value={s.weight||""}
                          onChange={function(e){logSet(ex.id,i,"weight",e.target.value);}}
                          style={{width:"100%",background:"#f5f0e8",border:"1px solid #c8c2b4",color:"#2a2420",padding:"5px 2px",fontSize:12,textAlign:"center",fontFamily:"'Cormorant Garamond',serif",marginBottom:3,boxSizing:"border-box"}}
                        />
                        <button
                          onClick={function(){logSet(ex.id,i,"done",!s.done);}}
                          style={{width:"100%",padding:"4px 0",background:s.done?"#8b1a2e":"#f5f0e8",border:"1px solid",borderColor:s.done?"#8b1a2e":"#c8c2b4",color:s.done?"#f5f0e8":"#606050",cursor:"pointer",fontSize:9,fontFamily:"'Cormorant Garamond',serif"}}
                        >{s.done?"✓":"LOG"}</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
          <div style={{marginTop:20}}>
            <div style={{fontSize:10,color:"#606050",letterSpacing:"0.15em",marginBottom:6,textTransform:"uppercase"}}>Session note</div>
            <textarea
              placeholder="e.g. felt strong, left shoulder tight..."
              value={note}
              onChange={function(e){setNote(e.target.value);}}
              style={{width:"100%",background:"#ede8de",border:"1px solid #c8c2b4",color:"#2a2420",padding:"10px 12px",fontSize:13,fontFamily:"'Cormorant Garamond',serif",boxSizing:"border-box",resize:"none",height:70,display:"block"}}
            ></textarea>
            <div style={{marginTop:6}}><Btn small onClick={saveNote}>Save Note</Btn></div>
            {sess.note && <div style={{fontSize:11,color:"#909080",marginTop:8,fontStyle:"italic"}}>Saved: {sess.note}</div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── SWIM FLOW ─────────────────────────────────────────────────────────────────
function SwimFlow(props) {

    setData(function(prev) {

    });

  var inp = {width:"100%",background:"#ede8de",border:"1px solid #c8c2b4",color:"#2a2420",padding:"10px 12px",fontSize:14,fontFamily:"'Cormorant Garamond',serif",boxSizing:"border-box"};

    <div>

          <div style={{fontSize:10,color:"#606050",letterSpacing:"0.15em",marginBottom:5,textTransform:"uppercase"}}>Laps</div>

        </div>

      <div style={{display:"flex",gap:8,marginBottom:sauna===true?16:24}}>
        <Btn active={sauna===true} small onClick={function(){setSauna(true);}}>Yes</Btn>
        <Btn active={sauna===false} small onClick={function(){setSauna(false);setSaunaTime("");}}>No</Btn>
      </div>

        <div style={{marginBottom:24}}>
          <div style={{fontSize:10,color:"#606050",letterSpacing:"0.15em",marginBottom:5,textTransform:"uppercase"}}>Sauna duration (min)</div>

      )}
      <Btn gold full onClick={save}>Save Session</Btn>
    </div>
  );
}

// ── TODAY TAB ─────────────────────────────────────────────────────────────────
function TodayTab(props) {
  var data=props.data, setData=props.setData, showFlash=props.showFlash;
  var [selDay,setSelDay] = useState(todayDay());
  var date = getTodayKey();
  var activity = (data.sessions&&data.sessions[date]&&data.sessions[date][selDay]&&data.sessions[date][selDay].activity)||null;
  var streak = getStreak(data);
  var nextSess = getNextSession(data);

  function setActivity(act) {
    setData(function(prev) {
      return Object.assign({},prev,{sessions:Object.assign({},prev.sessions,{[date]:Object.assign({},prev.sessions&&prev.sessions[date],{[selDay]:{activity:act}})})});
    });
  }
  function resetActivity() {
    setData(function(prev) {

      <div style={{display:"flex",gap:6,marginBottom:24,flexWrap:"wrap"}}>

                  onMouseLeave={function(e){e.currentTarget.style.borderColor="#d0cabe";}}
                >
                  <div>
                    <div style={{fontSize:15,color:"#2a2420",letterSpacing:"0.06em",marginBottom:3}}>{opt.label}</div>
                    <div style={{fontSize:11,color:"#606050"}}>{opt.sub}</div>
                  </div>
                  <div style={{fontSize:20,color:"#a0a090"}}>›</div>
                </button>
              );
            })}
          </div>
        </div>

        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>

// ── HISTORY TAB ───────────────────────────────────────────────────────────────
function WeightChart(props) {
  var logs = props.logs;
  if (!logs || logs.length < 2) return null;
  var vals = logs.map(function(l){return l.weight;});
  var minV = Math.min.apply(null,vals.concat([BODY_START]))-0.5;
  var maxV = Math.max.apply(null,vals.concat([TARGET_HIGH]))+0.5;
  var range = maxV-minV;
  var W=300, H=80;
  var pts = vals.map(function(v,i){
    return ((i/(vals.length-1))*W)+","+(H-((v-minV)/range)*H);
  }).join(" ");
  var targetY = H-((TARGET_LOW-minV)/range)*H;
  var targetHighY = H-((TARGET_HIGH-minV)/range)*H;
  return (
    <div style={{background:"#ede8de",border:"1px solid #d8d2c6",padding:14,marginBottom:20}}>
      <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{display:"block",overflow:"visible"}}>
        <rect x="0" y={targetHighY} width={W} height={targetY-targetHighY} fill="#8b1a2e" opacity="0.07"/>
        <line x1="0" y1={targetY} x2={W} y2={targetY} stroke="#8b1a2e" strokeWidth="0.8" strokeDasharray="4,3" opacity="0.4"/>
        <line x1="0" y1={targetHighY} x2={W} y2={targetHighY} stroke="#8b1a2e" strokeWidth="0.8" strokeDasharray="4,3" opacity="0.4"/>
        <polyline points={pts} fill="none" stroke="#4a8a5a" strokeWidth="2"/>
        {vals.map(function(v,i){
          var x=(i/(vals.length-1))*W;
          var y=H-((v-minV)/range)*H;
          return <circle key={i} cx={x} cy={y} r="2.5" fill="#4a8a5a"/>;
        })}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#a0a090",marginTop:4}}>
        <span>{logs[0].date}</span>
        <span style={{color:"#8b1a2e"}}>▪ {TARGET_LOW}–{TARGET_HIGH}kg target</span>
        <span>{logs[logs.length-1].date}</span>
      </div>
    </div>
  );
}

function ExChart(props) {
  var history = props.history;
  if (!history || history.length < 2) return null;
  var vals = history.map(function(h){return h.weight;}).reverse();
  var minV = Math.min.apply(null,vals);
  var maxV = Math.max.apply(null,vals);
  var range = maxV-minV||1;
  var W=300, H=60;
  var pts = vals.map(function(v,i){
    return ((i/(vals.length-1))*W)+","+(H-((v-minV)/range)*H);
  }).join(" ");
  return (
    <div style={{background:"#ede8de",border:"1px solid #d8d2c6",padding:14,marginBottom:20}}>
      <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{display:"block"}}>
        <polyline points={pts} fill="none" stroke="#8b1a2e" strokeWidth="1.5"/>
        {vals.map(function(v,i){
          var x=(i/(vals.length-1))*W;
          var y=H-((v-minV)/range)*H;
          return <circle key={i} cx={x} cy={y} r="3" fill="#8b1a2e"/>;
        })}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#a0a090",marginTop:4}}>
        <span>{history[history.length-1].date}</span>
        <span>{history[0].date}</span>
      </div>
    </div>
  );
}

  for (var w=0; w<5; w++) {
    var week = [];

      var key = day.toISOString().split("T")[0];
      var info = getSessionInfo(data, key);

                  <div key={h.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #e0dbd0"}}>
                    <span style={{fontSize:11,color:"#606050"}}>{h.date}</span>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:13,color:"#2a2420"}}>{h.weight}kg</span>
                      {prev && <Delta prev={prev.weight} current={h.weight}/>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── MACROS TAB ────────────────────────────────────────────────────────────────

// Custom saved products — always appear first in search
var CUSTOM_PRODUCTS = [
  { id:"leif_protein", name:"Leif Proteine", brand:"Custom", kcal:300, protein:40, carbs:18, fat:2, per:100, unit:"ml", custom:true },
  { id:"denner_yogurt", name:"Denner Yogurt 1.5%", brand:"Denner", kcal:44, protein:4.3, carbs:4.8, fat:1.5, per:100, unit:"g", custom:true },
  { id:"denner_muesli", name:"Denner Muesli", brand:"Denner", kcal:370, protein:9, carbs:65, fat:6, per:100, unit:"g", custom:true },
  { id:"dried_figs", name:"Dried Figs", brand:"", kcal:249, protein:3.3, carbs:57, fat:0.9, per:100, unit:"g", custom:true },
  { id:"whey_powder", name:"Whey Protein Powder", brand:"Generic", kcal:400, protein:80, carbs:8, fat:4, per:100, unit:"g", custom:true },
];

function MacrosTab(props) {
  var data=props.data, setData=props.setData, showFlash=props.showFlash;
  var date = getTodayKey();
  var [query,setQuery] = useState("");
  var [qty,setQty] = useState("100");
  var [results,setResults] = useState([]);
  var [searching,setSearching] = useState(false);
  var [selected,setSelected] = useState(null);
  var [view,setView] = useState("search");
  var [manual,setManual] = useState({name:"",kcal:"",protein:"",carbs:"",fat:""});

  var todayFoods = (data.foodLogs&&data.foodLogs[date])||[];
  var totals = todayFoods.reduce(function(acc,f){
    return {kcal:acc.kcal+(f.kcal||0),protein:acc.protein+(f.protein||0),carbs:acc.carbs+(f.carbs||0),fat:acc.fat+(f.fat||0)};
  },{kcal:0,protein:0,carbs:0,fat:0});

  function search() {
    if (!query.trim()) return;

    // First check custom products
    var q = query.toLowerCase();
    var customMatches = CUSTOM_PRODUCTS.filter(function(p){
      return p.name.toLowerCase().indexOf(q) > -1 || (p.brand && p.brand.toLowerCase().indexOf(q) > -1);
    });

    setSearching(true); setResults(customMatches.length ? customMatches : []); setSelected(null);

    // Then search Open Food Facts (European database)
    fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(query)+"&search_simple=1&action=process&json=1&page_size=8&fields=product_name,brands,nutriments,serving_size,serving_quantity")
      .then(function(r){return r.json();})
      .then(function(json){
        var foods = (json.products||[])
          .filter(function(p){ return p.product_name && p.nutriments; })
          .map(function(p){
            var n = p.nutriments||{};
            // OFF uses _100g suffix for per-100g values
            var kcal = Math.round(n["energy-kcal_100g"] || n["energy_100g"]/4.184 || 0);
            var protein = Math.round((n["proteins_100g"]||0)*10)/10;
            var carbs = Math.round((n["carbohydrates_100g"]||0)*10)/10;
            var fat = Math.round((n["fat_100g"]||0)*10)/10;
            return {
              id: p.code||p.product_name,
              name: p.product_name,
              brand: p.brands||"",
              kcal: kcal,
              protein: protein,
              carbs: carbs,
              fat: fat,
              per: 100,
              unit: "g",
              custom: false,
            };
          })
          .filter(function(p){ return p.kcal > 0; }); // remove entries with no calorie data

        // Merge: custom matches first, then OFF results, dedupe
        var combined = customMatches.concat(foods).slice(0, 8);
        setResults(combined);
        setSearching(false);
      })
      .catch(function(){
        // If OFF fails, still show custom matches
        setResults(customMatches);
        if (!customMatches.length) showFlash("Search failed — check connection");
        setSearching(false);
      });
  }
  function scale(val,per,q){return Math.round((val/(per||100))*parseFloat(q||100)*10)/10;}
  function addFood(food) {
    var q=parseFloat(qty)||100;
    var entry={id:Date.now(),name:food.name,qty:q,unit:food.unit,kcal:scale(food.kcal,food.per,q),protein:scale(food.protein,food.per,q),carbs:scale(food.carbs,food.per,q),fat:scale(food.fat,food.per,q)};
    setData(function(prev){return Object.assign({},prev,{foodLogs:Object.assign({},prev.foodLogs,{[date]:[...(prev.foodLogs&&prev.foodLogs[date]||[]),entry]})});});
    setQuery("");setResults([]);setSelected(null);setQty("100");
    showFlash(food.name.split(",")[0]+" added");
  }
  function addManual() {
    if (!manual.name.trim()){showFlash("Add a name");return;}
    var entry={id:Date.now(),name:manual.name,qty:null,unit:"",kcal:parseFloat(manual.kcal)||0,protein:parseFloat(manual.protein)||0,carbs:parseFloat(manual.carbs)||0,fat:parseFloat(manual.fat)||0};
    setData(function(prev){return Object.assign({},prev,{foodLogs:Object.assign({},prev.foodLogs,{[date]:[...(prev.foodLogs&&prev.foodLogs[date]||[]),entry]})});});
    setManual({name:"",kcal:"",protein:"",carbs:"",fat:""});
    showFlash(manual.name+" added");
  }
  function removeFood(id){
    setData(function(prev){return Object.assign({},prev,{foodLogs:Object.assign({},prev.foodLogs,{[date]:(prev.foodLogs&&prev.foodLogs[date]||[]).filter(function(f){return f.id!==id;})})});});
  }
  var inp = {width:"100%",background:"#ede8de",border:"1px solid #c8c2b4",color:"#2a2420",padding:"10px 12px",fontSize:14,fontFamily:"'Cormorant Garamond',serif",boxSizing:"border-box"};

  return (
    <div style={{padding:"20px 24px"}}>
      <Label>Today's Nutrition</Label>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:20}}>
        {Object.keys(MACROS).map(function(k){
          var target=MACROS[k], val=Math.round(totals[k]||0), pct=Math.min(100,(val/target)*100), over=val>target;
          return (
            <div key={k} style={{background:"#ede8de",border:"1px solid "+(over?"#8b1a2e":"#d0cabe"),padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:9,color:"#909080",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>{k}</div>
              <div style={{fontSize:16,fontWeight:300,color:over?"#8b1a2e":"#2a2420"}}>{val}</div>
              <div style={{fontSize:9,color:"#a0a090",marginBottom:6}}>{k==="kcal"?"kcal":"g"}</div>
              <div style={{height:2,background:"#e0dbd0"}}><div style={{height:"100%",width:pct+"%",background:over?"#8b1a2e":"#4a8a5a",transition:"width 0.3s"}}></div></div>
              <div style={{fontSize:8,color:"#b0a898",marginTop:3}}>{target}{k==="kcal"?"":"g"}</div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
        <Btn active={view==="search"} small onClick={function(){setView("search");}}>Search</Btn>
        <Btn active={view==="manual"} small onClick={function(){setView("manual");}}>Manual</Btn>
        <Btn active={view==="log"} small onClick={function(){setView("log");}}>Today's Log</Btn>
        <Btn active={view==="alerts"} small onClick={function(){setView("alerts");}}>Alerts</Btn>
      </div>

      {view==="search" && (
        <div>
          <Label>My Saved Products</Label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:18}}>
            {CUSTOM_PRODUCTS.map(function(p){
              return (
                <button key={p.id} onClick={function(){setSelected(p);setQty("100");}} style={{padding:"5px 10px",background:"#ede8de",border:"1px solid #c8a898",color:"#8b1a2e",cursor:"pointer",fontSize:10,letterSpacing:"0.1em",fontFamily:"'Cormorant Garamond',serif"}}>
                  {p.name}
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input placeholder="e.g. chicken breast, oats..." value={query} onChange={function(e){setQuery(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")search();}} style={Object.assign({},inp,{flex:1})}/>
            <Btn gold onClick={search}>{searching?"...":"Search"}</Btn>
          </div>
          {searching && <div style={{fontSize:12,color:"#909080",fontStyle:"italic",textAlign:"center",padding:"16px 0"}}>Searching Open Food Facts...</div>}
          {results.length>0 && !selected && (
            <div>
              <div style={{fontSize:10,color:"#909080",letterSpacing:"0.15em",marginBottom:10,textTransform:"uppercase"}}>Select a result</div>
              {results.map(function(food){
                return (
                  <button key={food.id} onClick={function(){setSelected(food);}} style={{width:"100%",background:food.custom?"#f0ebe0":"#ede8de",border:"1px solid "+(food.custom?"#c8a898":"#d0cabe"),padding:"10px 12px",marginBottom:6,cursor:"pointer",textAlign:"left",fontFamily:"'Cormorant Garamond',serif",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                    onMouseEnter={function(e){e.currentTarget.style.borderColor="#8b1a2e";}}
                    onMouseLeave={function(e){e.currentTarget.style.borderColor=food.custom?"#c8a898":"#d0cabe";}}
                  >
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                        <div style={{fontSize:12,color:"#2a2420"}}>{food.name.length>40?food.name.slice(0,40)+"...":food.name}</div>
                        {food.custom && <div style={{fontSize:8,background:"#8b1a2e",color:"#f5f0e8",padding:"1px 5px",letterSpacing:"0.1em"}}>SAVED</div>}
                      </div>

                    </div>
                    <div style={{fontSize:10,color:"#8b1a2e",textAlign:"right",minWidth:60}}>
                      <div>{food.kcal} kcal</div>
                      <div style={{color:"#909080"}}>per {food.per}{food.unit}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          )}
          {selected && (
            <div>
              <div style={{background:"#ede8de",border:"1px solid #8b1a2e",padding:14,marginBottom:14}}>
                <div style={{fontSize:13,color:"#2a2420",marginBottom:2}}>{selected.name.split(",")[0]}</div>
                {selected.brand && <div style={{fontSize:10,color:"#909080",marginBottom:10}}>{selected.brand}</div>}
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:14}}>
                  {[["Kcal",selected.kcal,""],["Protein",selected.protein,"g"],["Carbs",selected.carbs,"g"],["Fat",selected.fat,"g"]].map(function(item){
                    return (
                      <div key={item[0]} style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:"#909080",textTransform:"uppercase",marginBottom:2}}>{item[0]}</div>
                        <div style={{fontSize:14,color:"#2a2420"}}>{item[1]}{item[2]}</div>
                        <div style={{fontSize:9,color:"#b0a898"}}>per {selected.per}{selected.unit}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{fontSize:10,color:"#606050",letterSpacing:"0.12em",marginBottom:6,textTransform:"uppercase"}}>Quantity ({selected.unit})</div>
                <div style={{display:"flex",gap:8}}>
                  <input type="number" value={qty} onChange={function(e){setQty(e.target.value);}} style={Object.assign({},inp,{width:100})}/>
                  <div style={{flex:1,background:"#f5f0e8",border:"1px solid #d8d2c6",padding:"10px 12px",fontSize:12,color:"#504e42"}}>
                    {"→ "}{scale(selected.kcal,selected.per,qty)} kcal · {scale(selected.protein,selected.per,qty)}g P · {scale(selected.carbs,selected.per,qty)}g C · {scale(selected.fat,selected.per,qty)}g F

              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn gold full onClick={function(){addFood(selected);}}>Add to Log</Btn>
                <Btn small onClick={function(){setSelected(null);}}>Back</Btn>
              </div>
            </div>
          )}
          {!searching && results.length===0 && query && <div style={{fontSize:12,color:"#a0a090",fontStyle:"italic",textAlign:"center",padding:"20px 0"}}>No results. Try a simpler term.</div>}
        </div>
      )}

      {view==="manual" && (
        <div>
          <Label>Manual Entry</Label>
          <div style={{fontSize:11,color:"#909080",marginBottom:16,lineHeight:1.5}}>Enter exact values from a food label or your own estimate.</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:"#606050",letterSpacing:"0.15em",marginBottom:5,textTransform:"uppercase"}}>Food name</div>
            <input placeholder="e.g. Denner yogurt 1.5%, 100g muesli..." value={manual.name} onChange={function(e){setManual(Object.assign({},manual,{name:e.target.value}));}} style={inp}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[{k:"kcal",label:"Calories (kcal)",ph:"e.g. 350"},{k:"protein",label:"Protein (g)",ph:"e.g. 30"},{k:"carbs",label:"Carbs (g)",ph:"e.g. 45"},{k:"fat",label:"Fat (g)",ph:"e.g. 12"}].map(function(f){
              return (
                <div key={f.k}>
                  <div style={{fontSize:10,color:"#606050",letterSpacing:"0.15em",marginBottom:5,textTransform:"uppercase"}}>{f.label}</div>
                  <input type="number" placeholder={f.ph} value={manual[f.k]} onChange={function(e){var m=Object.assign({},manual);m[f.k]=e.target.value;setManual(m);}} style={inp}/>
                </div>
              );
            })}
          </div>
          {(manual.kcal||manual.protein||manual.carbs||manual.fat) && (
            <div style={{background:"#ede8de",border:"1px solid #d8d2c6",padding:"10px 14px",marginBottom:14}}>
              <div style={{fontSize:10,color:"#909080",letterSpacing:"0.12em",marginBottom:6,textTransform:"uppercase"}}>Preview</div>
              <div style={{display:"flex",gap:16,fontSize:12,color:"#504e42"}}>

              <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #e0dbd0"}}>

              <div style={{fontSize:10,color:"#8b1a2e",letterSpacing:"0.15em",marginBottom:8,textTransform:"uppercase"}}>Daily Total</div>

      )}
    </div>

// ── PROGRESS TAB ──────────────────────────────────────────────────────────────
function ProgressTab(props) {
  var data=props.data, setData=props.setData, showFlash=props.showFlash;
  var [newWeight,setNewWeight] = useState("");
  var logs = data.bodyLogs||[];
  var latest = logs.length ? logs[logs.length-1].weight : BODY_START;
  var toTarget = Math.max(0,TARGET_HIGH-latest).toFixed(1);
  var progress = Math.min(100,((latest-BODY_START)/(TARGET_HIGH-BODY_START))*100);
  var today = getTodayKey();
  var suppDone = (data.suppLogs&&data.suppLogs[today])||{};

  function logWeight() {
    if (!newWeight) return;
    setData(function(prev){return Object.assign({},prev,{bodyLogs:[...(prev.bodyLogs||[]),{date:today,weight:parseFloat(newWeight)}]});});
    setNewWeight(""); showFlash("Weight logged");
  }
  function toggleSupp(s) {
    setData(function(prev){
      var sl = JSON.parse(JSON.stringify(prev.suppLogs||{}));
      if (!sl[today]) sl[today]={};
      sl[today][s] = !sl[today][s];
      return Object.assign({},prev,{suppLogs:sl});
    });
  }

  return (
    <div style={{padding:"20px 24px"}}>
      <Label>Body</Label>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
        {[{label:"Current",value:latest,unit:"kg"},{label:"Target",value:TARGET_LOW+"–"+TARGET_HIGH,unit:"kg"},{label:"To Go",value:toTarget,unit:"kg"}].map(function(s){
          return (
            <div key={s.label} style={{background:"#ede8de",border:"1px solid #d0cabe",padding:12,textAlign:"center"}}>
              <div style={{fontSize:10,color:"#606050",letterSpacing:"0.15em",marginBottom:6,textTransform:"uppercase"}}>{s.label}</div>
              <div style={{fontSize:18,fontWeight:300}}>{s.value}<span style={{fontSize:10,color:"#504e42"}}>{s.unit}</span></div>
            </div>
          );
        })}
      </div>

      <WeightChart logs={logs.slice(-20)}/>

      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#606050",marginBottom:6}}>
          <span>Lean bulk progress</span><span style={{color:"#8b1a2e"}}>{Math.max(0,progress).toFixed(0)}%</span>
        </div>
        <div style={{height:4,background:"#e0dbd0"}}><div style={{height:"100%",width:Math.max(0,progress)+"%",background:"#8b1a2e",transition:"width 0.5s"}}></div></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#a0a090",marginTop:4}}>
          <span>{BODY_START}kg</span><span>{TARGET_LOW}–{TARGET_HIGH}kg</span>
        </div>
      </div>

      <div style={{display:"flex",gap:10,marginBottom:28}}>
        <input type="number" step="0.1" placeholder="Today's weight (kg)" value={newWeight} onChange={function(e){setNewWeight(e.target.value);}} style={{flex:1,background:"#ede8de",border:"1px solid #c8c2b4",color:"#2a2420",padding:"10px 12px",fontSize:14,fontFamily:"'Cormorant Garamond',serif"}}/>
        <Btn gold onClick={logWeight}>Log</Btn>
      </div>

      <Label>Supplements — Today</Label>
      <div style={{marginBottom:28}}>
        {SUPPS.map(function(s){
          var done = suppDone[s.id];
          return (
            <button key={s.id} onClick={function(){toggleSupp(s.id);}} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px",marginBottom:6,background:done?"#e8e0d4":"#ede8de",border:"1px solid "+(done?"#8b1a2e":"#d0cabe"),cursor:"pointer",fontFamily:"'Cormorant Garamond',serif"}}>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:12,color:done?"#8b1a2e":"#2a2420"}}>{s.label}</div>
                <div style={{fontSize:10,color:"#909080"}}>{s.time}</div>
              </div>
              <div style={{width:18,height:18,borderRadius:"50%",border:"1.5px solid "+(done?"#8b1a2e":"#c8c2b4"),background:done?"#8b1a2e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#f5f0e8"}}>
                {done?"✓":""}
              </div>
            </button>
          );
        })}
      </div>

      <Label>Strength Targets</Label>
      {(function(){
        // Map each target to the exercise IDs that represent it across sessions
        var targets = [
          {name:"Bench Press",  exIds:["bench","bench2","incline_db_b","flat_db"], target:100, unit:"kg",      bw:false},
          {name:"Pull-ups",     exIds:["pullups"],                                 target:20,  unit:"kg added", bw:true},
          {name:"Close-Grip BP",exIds:["cgbp"],                                   target:75,  unit:"kg",      bw:false},
          {name:"EZ Bar Curl",  exIds:["ez_arms","ez_curl"],                       target:20,  unit:"kg/side", bw:false},
          {name:"OHP (DB)",     exIds:["ohp_db","ohp_db2","sohp"],                 target:32,  unit:"kg",      bw:false},
          {name:"Lat Pulldown", exIds:["latpull"],                                 target:85,  unit:"kg",      bw:false},
        ];
        // Find best ever weight across all sessions for a list of exercise IDs
        function getBestEver(exIds) {
          var best = 0;
          var allDates = Object.keys(data.sessions||{});
          for (var i=0; i<allDates.length; i++) {
            var sess = data.sessions[allDates[i]];
            if (!sess||!sess.gym||!sess.gym.sets) continue;
            for (var j=0; j<exIds.length; j++) {
              var w = getBestWeight(sess.gym.sets[exIds[j]]);
              if (w!==null && w>best) best=w;
            }
          }
          return best;
        }
        return targets.map(function(m){
          var current = getBestEver(m.exIds);
          var displayCurrent = current > 0 ? current : "—";
          var pct = (current>0 && !m.bw) ? Math.min(100,(current/m.target)*100) : 0;
          return (
            <div key={m.name} style={{marginBottom:16,background:"#ede8de",border:"1px solid #d0cabe",padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
                <span>{m.name}</span>
                <span style={{color:"#504e42",fontSize:11}}>
                  {m.bw?"BW":displayCurrent+(current>0?m.unit:"")} → {m.bw?"BW+"+m.target+"kg":m.target+m.unit}
                </span>
              </div>
              <div style={{height:3,background:"#e0dbd0",marginBottom:4}}>
                <div style={{height:"100%",width:pct+"%",background:pct>=100?"#3a7a4a":"#8b1a2e",transition:"width 0.5s"}}></div>
              </div>
              <div style={{fontSize:9,color:"#a0a090"}}>
                {current>0 ? (pct>=100?"Target reached!":Math.round(pct)+"% of target") : "No data logged yet"}
              </div>
            </div>
          );
        });
      })()}

      <div style={{marginTop:28}}>
        <Label>Milestones</Label>
        {[{label:"6 months",target:"Bench 75kg / OHP 26kg each"},{label:"10 months",target:"Lat Pulldown 65kg / Curls 45kg"},{label:"14–18 months",target:"All max targets achievable"}].map(function(m,i){
          return (
            <div key={i} style={{display:"flex",gap:16,padding:"10px 0",borderBottom:"1px solid #e0dbd0",fontSize:11}}>
              <span style={{color:"#8b1a2e",minWidth:90}}>{m.label}</span>
              <span style={{color:"#504e42"}}>{m.target}</span>
            </div>
          );
        })}
      </div>

      {logs.length>0 && (
        <div style={{marginTop:28}}>
          <Label>Weight History</Label>
          {logs.slice(-8).reverse().map(function(l,i){
            return (
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #e0dbd0",fontSize:12}}>
                <span style={{color:"#606050"}}>{l.date}</span><span>{l.weight} kg</span>
              </div>
            );
          })}
        </div>
      )}

      <div style={{marginTop:32}}>
        <button onClick={function(){exportCSV(data);}} style={{width:"100%",padding:12,background:"none",border:"1px solid #c8c2b4",color:"#787868",cursor:"pointer",fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",fontFamily:"'Cormorant Garamond',serif"}}>Export Data as CSV</button>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  var [tab,setTab] = useState("today");
  var [data,setData] = useState(loadData);
  var [flash,setFlash] = useState("");
  useEffect(function(){saveData(data);},[data]);
  function showFlash(msg){setFlash(msg);setTimeout(function(){setFlash("");},2000);}
  return (
    <div style={{minHeight:"100vh",background:"#f5f0e8",color:"#2a2420",fontFamily:"'Cormorant Garamond',Georgia,serif"}}>
      <div style={{position:"fixed",inset:0,opacity:0.03,pointerEvents:"none",zIndex:0,backgroundImage:"repeating-linear-gradient(0deg,#c8a898 0,#c8a898 1px,transparent 1px,transparent 40px),repeating-linear-gradient(90deg,#c8a898 0,#c8a898 1px,transparent 1px,transparent 40px)"}}></div>
      {flash && <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#8b1a2e",color:"#f5f0e8",padding:"8px 24px",fontSize:12,letterSpacing:"0.12em",zIndex:100,fontWeight:700,fontFamily:"'Cormorant Garamond',serif"}}>{flash}</div>}
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 0 80px",position:"relative",zIndex:1}}>
        <div style={{padding:"40px 24px 0",borderBottom:"1px solid #d8d2c6"}}>
          <div style={{fontSize:10,letterSpacing:"0.32em",color:"#8b1a2e",marginBottom:4,textTransform:"uppercase"}}>Hakansons</div>
          <div style={{fontSize:28,fontWeight:300,letterSpacing:"0.04em",lineHeight:1}}>Training Log</div>
          <div style={{display:"flex",marginTop:24}}>
            {["today","history","macros","progress"].map(function(t){
              return <button key={t} onClick={function(){setTab(t);}} style={{flex:1,padding:"10px 0",background:"none",border:"none",borderBottom:tab===t?"2px solid #8b1a2e":"2px solid transparent",color:tab===t?"#8b1a2e":"#909080",cursor:"pointer",fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",fontFamily:"'Cormorant Garamond',serif",transition:"all 0.2s"}}>{t}</button>;
            })}
          </div>
        </div>
        {tab==="today" && <TodayTab data={data} setData={setData} showFlash={showFlash}/>}
        {tab==="history" && <HistoryTab data={data}/>}
        {tab==="macros" && <MacrosTab data={data} setData={setData} showFlash={showFlash}/>}
        {tab==="progress" && <ProgressTab data={data} setData={setData} showFlash={showFlash}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#f5f0e8",borderTop:"1px solid #e0dbd0",padding:"12px 24px",textAlign:"center",fontSize:10,color:"#b8b2a4",letterSpacing:"0.2em",zIndex:10}}>
        72.4 → 75–78 KG · 3200 KCAL · 145G PROTEIN
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>
</body>
